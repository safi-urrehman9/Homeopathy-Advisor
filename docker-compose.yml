services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: sh -c "python -m alembic -c alembic.ini upgrade head && gunicorn -b 0.0.0.0:5000 wsgi:app"
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: sqlite:////app/backend/instance/vitalforce.db
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://localhost:3000
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      SECRET_KEY: ${SECRET_KEY}
      JWT_EXPIRES_IN_SECONDS: ${JWT_EXPIRES_IN_SECONDS:-604800}
    volumes:
      - sqlite-data:/app/backend/instance
    depends_on:
      - redis

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:5000/api/v1
    depends_on:
      - backend

volumes:
  sqlite-data:
